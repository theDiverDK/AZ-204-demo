trigger: none

variables:
  azureSubscription: 'YOUR-AZURE-DEVOPS-SERVICE-CONNECTION'
  resourceGroupName: 'rg-conferencehub'
  location: 'swedencentral'
  mainWebAppName: 'app-conferencehub'
  storageAccountName: 'stconferencehub'
  cosmosAccountName: 'cosmos-conferencehub'
  cosmosDatabaseName: 'ConferenceHubDB'
  functionAppName: 'func-conferencehub'
  keyVaultUri: 'https://kv-conferencehub.vault.azure.net/'
  appConfigEndpoint: 'https://appconfig-conferencehub.azconfig.io'
  azureAdInstance: 'https://login.microsoftonline.com/'
  azureAdTenantId: 'YOUR_TENANT_ID'
  azureAdClientId: 'YOUR_CLIENT_ID'
  azureAdClientSecret: '$(AzureAdClientSecret)'
  apiManagementGatewayUrl: 'https://apim-conferencehub.azure-api.net'
  apiManagementSubscriptionKey: '$(ApiManagementSubscriptionKey)'
  eventHubNamespaceName: 'evhns-conferencehub'
  eventHubName: 'session-feedback'
  serviceBusNamespaceName: 'sb-conferencehub'
  serviceBusQueueName: 'registration-queue'
  serviceBusTopicName: 'notification-topic'

stages:
  - stage: Deploy
    displayName: Deploy Learning Path 10 - Service Bus
    jobs:
      - job: DeployServiceBus
        displayName: Deploy Service Bus and Storage queues
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Deploy Bicep
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment group create \
                  --resource-group "$(resourceGroupName)" \
                  --template-file "$(Build.SourcesDirectory)/Learning Path/10-ServiceBus/infra.bicep" \
                  --parameters \
                      location="$(location)" \
                      mainWebAppName="$(mainWebAppName)" \
                      storageAccountName="$(storageAccountName)" \
                      cosmosAccountName="$(cosmosAccountName)" \
                      cosmosDatabaseName="$(cosmosDatabaseName)" \
                      functionAppName="$(functionAppName)" \
                      keyVaultUri="$(keyVaultUri)" \
                      appConfigEndpoint="$(appConfigEndpoint)" \
                      azureAdInstance="$(azureAdInstance)" \
                      azureAdTenantId="$(azureAdTenantId)" \
                      azureAdClientId="$(azureAdClientId)" \
                      azureAdClientSecret="$(azureAdClientSecret)" \
                      apiManagementGatewayUrl="$(apiManagementGatewayUrl)" \
                      apiManagementSubscriptionKey="$(apiManagementSubscriptionKey)" \
                      eventHubNamespaceName="$(eventHubNamespaceName)" \
                      eventHubName="$(eventHubName)" \
                      serviceBusNamespaceName="$(serviceBusNamespaceName)" \
                      serviceBusQueueName="$(serviceBusQueueName)" \
                      serviceBusTopicName="$(serviceBusTopicName)"
