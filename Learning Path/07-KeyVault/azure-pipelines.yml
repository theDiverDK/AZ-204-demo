trigger: none

variables:
  azureSubscription: 'YOUR-AZURE-DEVOPS-SERVICE-CONNECTION'
  resourceGroupName: 'rg-conferencehub'
  location: 'swedencentral'
  mainWebAppName: 'app-conferencehub'
  functionAppName: 'func-conferencehub'
  storageAccountName: 'stconferencehub'
  cosmosAccountName: 'cosmos-conferencehub'
  cosmosDatabaseName: 'ConferenceHubDB'
  keyVaultName: 'kv-conferencehub'
  appConfigName: 'appconfig-conferencehub'
  azureAdInstance: 'https://login.microsoftonline.com/'
  azureAdTenantId: 'YOUR_TENANT_ID'
  azureAdClientId: 'YOUR_CLIENT_ID'
  azureAdClientSecret: '$(AzureAdClientSecret)'

stages:
  - stage: Deploy
    displayName: Deploy Learning Path 07 - Key Vault and App Configuration
    jobs:
      - job: DeployKeyVault
        displayName: Deploy Key Vault and App Configuration
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Deploy Bicep
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment group create \
                  --resource-group "$(resourceGroupName)" \
                  --template-file "$(Build.SourcesDirectory)/Learning Path/07-KeyVault/infra.bicep" \
                  --parameters \
                      location="$(location)" \
                      mainWebAppName="$(mainWebAppName)" \
                      functionAppName="$(functionAppName)" \
                      storageAccountName="$(storageAccountName)" \
                      cosmosAccountName="$(cosmosAccountName)" \
                      cosmosDatabaseName="$(cosmosDatabaseName)" \
                      keyVaultName="$(keyVaultName)" \
                      appConfigName="$(appConfigName)" \
                      azureAdInstance="$(azureAdInstance)" \
                      azureAdTenantId="$(azureAdTenantId)" \
                      azureAdClientId="$(azureAdClientId)" \
                      azureAdClientSecret="$(azureAdClientSecret)"
