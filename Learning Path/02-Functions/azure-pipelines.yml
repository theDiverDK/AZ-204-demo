trigger: none

variables:
  azureSubscription: 'YOUR-AZURE-DEVOPS-SERVICE-CONNECTION'
  resourceGroupName: 'rg-conferencehub'
  location: 'swedencentral'
  functionStorageAccountName: 'stconfhubfunc'
  functionAppName: 'func-conferencehub'
  functionPlanName: 'plan-conferencehub-functions'
  mainWebAppName: 'app-conferencehub'

stages:
  - stage: Deploy
    displayName: Deploy Learning Path 02 - Functions
    jobs:
      - job: DeployFunctionsInfra
        displayName: Deploy Functions infrastructure
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Deploy Bicep
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment group create \
                  --resource-group "$(resourceGroupName)" \
                  --template-file "$(Build.SourcesDirectory)/Learning Path/02-Functions/infra.bicep" \
                  --parameters \
                      location="$(location)" \
                      functionStorageAccountName="$(functionStorageAccountName)" \
                      functionAppName="$(functionAppName)" \
                      functionPlanName="$(functionPlanName)" \
                      mainWebAppName="$(mainWebAppName)"
