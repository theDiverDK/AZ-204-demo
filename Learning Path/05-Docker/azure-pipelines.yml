trigger: none

variables:
  azureSubscription: 'YOUR-AZURE-DEVOPS-SERVICE-CONNECTION'
  resourceGroupName: 'rg-conferencehub'
  location: 'swedencentral'
  acrName: 'acrconferencehub'
  containerAppsEnvName: 'env-conferencehub'
  containerAppName: 'app-conferencehub'
  containerImage: 'acrconferencehub.azurecr.io/conferencehub:latest'
  storageAccountName: 'stconferencehub'
  cosmosAccountName: 'cosmos-conferencehub'
  cosmosDatabaseName: 'ConferenceHubDB'
  functionAppName: 'func-conferencehub'

stages:
  - stage: Deploy
    displayName: Deploy Learning Path 05 - Docker
    jobs:
      - job: DeployContainerInfra
        displayName: Deploy container infrastructure
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Deploy Bicep
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment group create \
                  --resource-group "$(resourceGroupName)" \
                  --template-file "$(Build.SourcesDirectory)/Learning Path/05-Docker/infra.bicep" \
                  --parameters \
                      location="$(location)" \
                      acrName="$(acrName)" \
                      containerAppsEnvName="$(containerAppsEnvName)" \
                      containerAppName="$(containerAppName)" \
                      containerImage="$(containerImage)" \
                      storageAccountName="$(storageAccountName)" \
                      cosmosAccountName="$(cosmosAccountName)" \
                      cosmosDatabaseName="$(cosmosDatabaseName)" \
                      functionAppName="$(functionAppName)"
