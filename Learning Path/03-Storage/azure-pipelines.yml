trigger: none

variables:
  azureSubscription: 'YOUR-AZURE-DEVOPS-SERVICE-CONNECTION'
  resourceGroupName: 'rg-conferencehub'
  location: 'swedencentral'
  storageAccountName: 'stconferencehub'
  functionAppName: 'func-conferencehub'
  mainWebAppName: 'app-conferencehub'

stages:
  - stage: Deploy
    displayName: Deploy Learning Path 03 - Storage
    jobs:
      - job: DeployStorageInfra
        displayName: Deploy Storage infrastructure
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Deploy Bicep
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment group create \
                  --resource-group "$(resourceGroupName)" \
                  --template-file "$(Build.SourcesDirectory)/Learning Path/03-Storage/infra.bicep" \
                  --parameters \
                      location="$(location)" \
                      storageAccountName="$(storageAccountName)" \
                      functionAppName="$(functionAppName)" \
                      mainWebAppName="$(mainWebAppName)"
