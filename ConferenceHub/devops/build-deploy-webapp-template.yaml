  #     webAppName: ${{ parameters.webAppName }}
  #     appServiceName: ${{ parameters.appServiceName }}
  #     appType: ${{ parameters.appType }}
  #     azureServiceConnectionName: ${{ parameters.azureServiceConnectionName }}
